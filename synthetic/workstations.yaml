# Synthetic workstation personas for Acme Widgets Co.
#
# Each persona represents a real small-business employee pattern. The publish
# script (publish.py) expands these into SSM-Inventory-shaped JSON records and
# uploads them to the inventory S3 bucket under a synthetic/ prefix. vcisco
# reads both real (SSM-delivered) and synthetic records from the same bucket.
#
# The distribution is deliberately uneven: most employees are "fine," a couple
# are a little behind, and one or two are a disaster. That's what real SMBs
# look like, and it's what makes vcisco's output interesting.

workstations:
  - id: WKS-001
    hostname: acme-founder-laptop
    persona: "Founder — admin rights, installs whatever she needs"
    os: "Windows 11 Pro 22H2"
    apps:
      - { name: "Google Chrome",      version: "120.0.6099.224" }
      - { name: "Microsoft 365 Apps", version: "16.0.17126.20132" }
      - { name: "Slack",              version: "4.36.140" }
      - { name: "Zoom",               version: "5.17.0" }
      - { name: "Notion",             version: "3.5.0" }
      - { name: "Visual Studio Code", version: "1.85.1" }
      - { name: "Git",                version: "2.43.0" }
      - { name: "Node.js",            version: "20.10.0" }

